<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Gaussian occupancy reconstruction architecture</title>
  <desc id="desc">A left to right flow diagram showing sparse 2D slices, Gaussian fitting, occupancy field evaluation, marching cubes mesh extraction, and ground-truth comparison.</desc>
  <defs>
    <style>
      .bg { fill: #f8fbff; }
      .box { fill: #ffffff; stroke: #c7d4e8; stroke-width: 2; rx: 18; ry: 18; }
      .box2 { fill: #eef5ff; stroke: #7aa4df; stroke-width: 2; rx: 18; ry: 18; }
      .gt { fill: #f4f7fb; stroke: #9aa8ba; stroke-width: 2; rx: 18; ry: 18; }
      .arrow { stroke: #0057b8; stroke-width: 5; fill: none; marker-end: url(#arrowHead); }
      .arrow2 { stroke: #111111; stroke-width: 4; fill: none; marker-end: url(#arrowHeadDark); }
      .title { font: 700 28px Georgia, serif; fill: #111111; }
      .label { font: 600 22px Verdana, sans-serif; fill: #0057b8; letter-spacing: 0.03em; }
      .text { font: 20px Georgia, serif; fill: #111111; }
      .small { font: 17px Georgia, serif; fill: #4a5568; }
      .chip { fill: #0057b8; }
      .chip2 { fill: #111111; }
      .chipText { font: 700 16px Verdana, sans-serif; fill: #ffffff; letter-spacing: 0.04em; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0057b8" />
    </marker>
    <marker id="arrowHeadDark" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#111111" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="560" rx="24" ry="24" />
  <text class="title" x="60" y="56">Stabilized Gaussian Occupancy Reconstruction</text>

  <rect class="box" x="55" y="140" width="250" height="170" />
  <rect class="chip" x="78" y="160" width="120" height="28" rx="14" ry="14" />
  <text class="chipText" x="138" y="180" text-anchor="middle">INPUT</text>
  <text class="label" x="78" y="225">Sparse 2D slices</text>
  <text class="text" x="78" y="257">ED validation image</text>
  <text class="text" x="78" y="287">Label volume / affine</text>

  <rect class="box2" x="365" y="120" width="280" height="210" />
  <rect class="chip" x="390" y="140" width="150" height="28" rx="14" ry="14" />
  <text class="chipText" x="465" y="160" text-anchor="middle">FIT</text>
  <text class="label" x="390" y="205">Gaussian initialization</text>
  <text class="small" x="390" y="235">Seed means from occupied voxels</text>
  <text class="small" x="390" y="262">Optimize scales and opacities</text>
  <text class="small" x="390" y="289">Sampled occupancy supervision</text>

  <rect class="box" x="710" y="140" width="260" height="170" />
  <rect class="chip2" x="735" y="160" width="176" height="28" rx="14" ry="14" />
  <text class="chipText" x="823" y="180" text-anchor="middle">FIELD</text>
  <text class="label" x="735" y="225">3D occupancy field</text>
  <text class="text" x="735" y="257">1 - exp(-density)</text>
  <text class="text" x="735" y="287">Query anywhere in space</text>

  <rect class="gt" x="1030" y="120" width="300" height="210" />
  <rect class="chip2" x="1055" y="140" width="178" height="28" rx="14" ry="14" />
  <text class="chipText" x="1144" y="160" text-anchor="middle">OUTPUT</text>
  <text class="label" x="1055" y="205">Marching cubes mesh</text>
  <text class="small" x="1055" y="235">Predicted surface from occupancy</text>
  <text class="small" x="1055" y="262">Ground-truth label mesh</text>
  <text class="small" x="1055" y="289">Side-by-side comparison</text>

  <path class="arrow" d="M305 225 L355 225" />
  <path class="arrow" d="M645 225 L700 225" />
  <path class="arrow" d="M970 225 L1020 225" />

  <rect class="box" x="710" y="365" width="260" height="130" />
  <text class="label" x="735" y="405">Diagnostics</text>
  <text class="small" x="735" y="435">Orthogonal slices, metrics, and mesh viewer</text>
  <text class="small" x="735" y="462">Pages site shows prediction vs ground truth</text>

  <path class="arrow2" d="M840 310 L840 355" />
  <path class="arrow2" d="M970 430 L1020 430" />

  <rect class="gt" x="1030" y="365" width="300" height="130" />
  <text class="label" x="1055" y="405">Current result</text>
  <text class="small" x="1055" y="435">Subject-specific fit with mesh output</text>
  <text class="small" x="1055" y="462">Used for visual inspection in the report</text>
</svg>
